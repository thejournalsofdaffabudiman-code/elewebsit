<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran Kegiatan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            background-color: #f0ebf8;
            padding: 20px 0;
            min-height: 100vh;
        }

        .form-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 12px;
        }

        .form-header {
            background: white;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 12px;
            border-top: 10px solid #673ab7;
        }

        .form-title {
            font-size: 32px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 8px;
            word-wrap: break-word;
        }

        .form-description {
            font-size: 14px;
            color: #5f6368;
            line-height: 1.6;
        }

        .question-card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 12px;
            border-left: 6px solid transparent;
            transition: border-left-color 0.2s;
        }

        .question-card:hover {
            border-left-color: #673ab7;
        }

        .question-card.focused {
            border-left-color: #673ab7;
        }

        .question-label {
            font-size: 16px;
            color: #202124;
            margin-bottom: 8px;
            display: block;
            font-weight: 400;
        }

        .required-mark {
            color: #d93025;
            margin-left: 4px;
        }

        .input-field {
            width: 100%;
            border: none;
            border-bottom: 1px solid #dadce0;
            padding: 8px 0;
            font-size: 16px;
            color: #202124;
            background: transparent;
            transition: border-bottom-color 0.2s;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-bottom: 2px solid #673ab7;
        }

        .input-field::placeholder {
            color: #5f6368;
            opacity: 0.6;
        }

        textarea.input-field {
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 12px;
            resize: vertical;
            min-height: 60px;
        }

        textarea.input-field:focus {
            border: 2px solid #673ab7;
        }

        select.input-field {
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 12px;
            background: white;
            cursor: pointer;
        }

        select.input-field:focus {
            border: 2px solid #673ab7;
        }

        input[type="date"].input-field {
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 12px;
        }

        input[type="date"].input-field:focus {
            border: 2px solid #673ab7;
        }

        .date-range-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 12px;
        }

        .date-input-group {
            display: flex;
            flex-direction: column;
        }

        .date-label {
            font-size: 12px;
            color: #5f6368;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background-color: #fce8e6;
            color: #c5221f;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background-color: #fef7e0;
            color: #ea8600;
            border: 1px solid #ffeaa7;
        }

        .alert-success {
            background-color: #e6f4ea;
            color: #137333;
            border: 1px solid #c6e1c6;
        }

        .alert-info {
            background-color: #e8f0fe;
            color: #1967d2;
            border: 1px solid #aecbfa;
        }

        .submit-container {
            background: white;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .submit-button {
            background-color: #673ab7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
            letter-spacing: 0.25px;
            text-transform: uppercase;
        }

        .submit-button:hover:not(:disabled) {
            background-color: #7c4dff;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
        }

        .submit-button:active:not(:disabled) {
            background-color: #5e35b1;
        }

        .submit-button:disabled {
            background-color: #dadce0;
            color: #80868b;
            cursor: not-allowed;
        }

        .clear-button {
            background: transparent;
            color: #673ab7;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.25px;
        }

        .clear-button:hover {
            background-color: rgba(103, 58, 183, 0.04);
            border-radius: 4px;
        }

        .footer {
            text-align: center;
            color: #5f6368;
            font-size: 12px;
            margin-top: 24px;
            padding: 12px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #5f6368;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #673ab7;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Hide honeypot field */
        .honeypot {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            body {
                padding: 12px 0;
            }

            .form-header {
                padding: 20px 16px;
            }

            .form-title {
                font-size: 24px;
            }

            .question-card {
                padding: 20px 16px;
            }

            .date-range-container {
                grid-template-columns: 1fr;
            }

            .submit-container {
                padding: 20px 16px;
                flex-direction: column;
                align-items: stretch;
            }

            .submit-button,
            .clear-button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .form-title {
                font-size: 20px;
            }

            .question-label {
                font-size: 14px;
            }

            .input-field {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <!-- Header -->
        <div class="form-header">
            <h1 class="form-title" id="formTitle">Form Pendaftaran Kegiatan</h1>
            <p class="form-description" id="formDescription">Silakan isi formulir di bawah ini untuk mendaftarkan kegiatan Anda. Maksimal 2 kegiatan per hari.</p>
        </div>

        <!-- Form Questions -->
        <form id="activityForm">
            <!-- Honeypot field (bot trap) -->
            <input type="text" name="website" class="honeypot" tabindex="-1" autocomplete="off">
            
            <div id="formQuestions"></div>

            <!-- Date Range Question -->
            <div class="question-card">
                <label class="question-label">
                    Pilih Rentang Tanggal Kegiatan
                    <span class="required-mark">*</span>
                </label>
                <div class="date-range-container">
                    <div class="date-input-group">
                        <span class="date-label">Tanggal Mulai</span>
                        <input type="date" class="input-field" id="startDate" required>
                    </div>
                    <div class="date-input-group">
                        <span class="date-label">Tanggal Selesai</span>
                        <input type="date" class="input-field" id="endDate" required>
                    </div>
                </div>
                <div id="dateAlert" class="alert"></div>
                <div id="availabilityAlert" class="alert"></div>
            </div>

            <!-- Submit Section -->
            <div class="submit-container">
                <button type="button" class="clear-button" onclick="clearForm()">Hapus Form</button>
                <button type="submit" class="submit-button" id="submitBtn">Kirim</button>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="alert alert-success" style="margin: 0 0 12px 0;"></div>
        </form>

        <!-- Loading Indicator -->
        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <p>Mengirim data...</p>
        </div>

        <!-- Footer -->
        <div class="footer">
            🔒 Form ini diamankan dengan enkripsi end-to-end
        </div>
    </div>

    <script>
        // ============================================
        // KONFIGURASI FORM - UBAH DI SINI
        // ============================================
        
        const FORM_CONFIG = {
            title: "Form Pendaftaran Kegiatan",
            description: "Silakan isi formulir di bawah ini untuk mendaftarkan kegiatan Anda. Maksimal 2 kegiatan per hari.",
            maxActivitiesPerDay: 2,
            maxDateRange: 7,
            minDateRange: 1
        };

        const FORM_QUESTIONS = [
            {
                id: "nama",
                label: "Nama Lengkap",
                type: "text",
                required: true,
                placeholder: "Masukkan nama lengkap Anda"
            },
            {
                id: "email",
                label: "Email",
                type: "email",
                required: true,
                placeholder: "contoh@email.com"
            },
            {
                id: "judulKegiatan",
                label: "Judul Kegiatan",
                type: "text",
                required: true,
                placeholder: "Masukkan judul kegiatan"
            },
            {
                id: "PD",
                label: "Perangkat Daerah",
                type: "select",
                required: true,
                options: [
                    { value: "", label: "-- Pilih Jenis Kegiatan --" },
                    { value: "sekda", label: "Sekretariat Daerah" },
                    { value: "setdprd", label: "Sekretariat DPRD" },
                    { value: "inspektorat", label: "Inspektorat" },

                    // Dinas
                    { value: "dinas_pendidikan", label: "Dinas Pendidikan" },
                    { value: "dinas_kesehatan", label: "Dinas Kesehatan" },
                    { value: "dinas_bina_marga", label: "Dinas Bina Marga" },
                    { value: "dinas_sda", label: "Dinas Sumber Daya Air" },
                    { value: "dinas_cipta_karya", label: "Dinas Cipta Karya, Tata Ruang, dan Pertanahan" },
                    { value: "dinas_perumahan", label: "Dinas Perumahan Rakyat dan Kawasan Permukiman" },
                    { value: "satpol_pp", label: "Satuan Polisi Pamong Praja (Satpol PP)" },
                    { value: "dinas_gulkarmat", label: "Dinas Penanggulangan Kebakaran dan Penyelamatan" },
                    { value: "dinas_sosial", label: "Dinas Sosial" },
                    { value: "dinas_tk_transmigrasi_energi", label: "Dinas Tenaga Kerja, Transmigrasi, dan Energi" },
                    { value: "dinas_ppapp", label: "Dinas Pemberdayaan, Perlindungan Anak, dan Pengendalian Penduduk" },
                    { value: "dinas_kpkp", label: "Dinas Ketahanan Pangan, Kelautan, dan Pertanian" },
                    { value: "dinas_lh", label: "Dinas Lingkungan Hidup" },
                    { value: "dinas_dukcapil", label: "Dinas Kependudukan dan Pencatatan Sipil" },
                    { value: "dinas_perhubungan", label: "Dinas Perhubungan" },
                    { value: "dinas_kominfotik", label: "Dinas Komunikasi, Informatika, dan Statistik" },
                    { value: "dinas_dpmptsp", label: "Dinas Penanaman Modal dan Pelayanan Terpadu Satu Pintu" },
                    { value: "dinas_pora", label: "Dinas Pemuda dan Olahraga" },
                    { value: "dinas_kebudayaan", label: "Dinas Kebudayaan" },
                    { value: "dinas_perpusip", label: "Dinas Perpustakaan dan Kearsipan" },
                    { value: "dinas_parekraf", label: "Dinas Pariwisata dan Ekonomi Kreatif" },
                    { value: "dinas_pertamanan", label: "Dinas Pertamanan dan Hutan Kota" },
                    { value: "dinas_ppkukm", label: "Dinas Perindustrian, Perdagangan, Koperasi, Usaha Kecil dan Menengah" },

                    // Badan
                    { value: "bappeda", label: "Badan Perencanaan Pembangunan Daerah" },
                    { value: "bpkd", label: "Badan Pengelolaan Keuangan Daerah" },
                    { value: "bapenda", label: "Badan Pendapatan Daerah" },
                    { value: "bpad", label: "Badan Pengelolaan Aset Daerah" },
                    { value: "bp_bumd", label: "Badan Pembinaan Badan Usaha Milik Daerah" },
                    { value: "bppbj", label: "Badan Pelayanan Pengadaan Barang/Jasa" },
                    { value: "bkd", label: "Badan Kepegawaian Daerah" },
                    { value: "bpsdm", label: "Badan Pengembangan Sumber Daya Manusia" },
                    { value: "bpbd", label: "Badan Penanggulangan Bencana Daerah" },
                    { value: "kesbangpol", label: "Badan Kesatuan Bangsa dan Politik" },

                    // Kota Administrasi
                    { value: "jakpus", label: "Kota Administrasi Jakarta Pusat" },
                    { value: "jakut", label: "Kota Administrasi Jakarta Utara" },
                    { value: "jakbar", label: "Kota Administrasi Jakarta Barat" },
                    { value: "jaksel", label: "Kota Administrasi Jakarta Selatan" },
                    { value: "jaktim", label: "Kota Administrasi Jakarta Timur" },

                    // Kabupaten
                    { value: "kep_seribu", label: "Kabupaten Administrasi Kepulauan Seribu" }
                ]
            },
            {
                id: "deskripsi",
                label: "Deskripsi Kegiatan",
                type: "textarea",
                required: false,
                placeholder: "Jelaskan singkat tentang kegiatan ini (opsional)"
            },
            {
                id: "jumlahPermohonanDaya",
                label: "Estimasi Jumlah Permohonan Daya Listrik",
                type: "number",
                required: false,
                placeholder: "Contoh: 25"
            }
        ];

        // ============================================
        // SECURITY CONFIGURATION
        // ============================================
        
        // Secret tokens (akan di-obfuscate)
        const _0x4a2b = ['Zm9ybV9zZWNyZXRfa2V5XzIwMjY=', 'YXBpX3Rva2VuX3NlY3VyZV9rZXk='];
        const ekhonci = atob(_0x4a2b[0]);
        const firetokek = atob(_0x4a2b[1]);
        
        // Apps Script URL - GANTI DENGAN URL ANDA
        const elgoskrip = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";
        
        // Allowed domains (CORS protection) - kosongkan jika mau allow semua
        const eltale = [
            // "yourusername.github.io",
            // "sites.google.com"
        ];

        // ============================================
        // SECURITY FUNCTIONS
        // ============================================

        // Generate session fingerprint
        function generateFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('fingerprint', 2, 2);
            
            const dataURL = canvas.toDataURL();
            let hash = 0;
            for (let i = 0; i < dataURL.length; i++) {
                const char = dataURL.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            return hash.toString(16) + '-' + 
                   navigator.userAgent.length + '-' + 
                   screen.width + 'x' + screen.height;
        }

        // Generate request signature
        function generateSignature(data) {
            const timestamp = Date.now();
            const fingerprint = generateFingerprint();
            const payload = JSON.stringify(data) + timestamp + fingerprint;
            
            let hash = 0;
            for (let i = 0; i < payload.length; i++) {
                hash = ((hash << 5) - hash) + payload.charCodeAt(i);
                hash |= 0;
            }
            
            return {
                signature: btoa(hash.toString(16)),
                timestamp: timestamp,
                fingerprint: fingerprint
            };
        }

        // Check rate limit (client-side)
        function checkClientRateLimit() {
            const key = 'form_rate_limit';
            const now = Date.now();
            const hourAgo = now - (60 * 60 * 1000);
            
            let requests = JSON.parse(localStorage.getItem(key) || '[]');
            requests = requests.filter(time => time > hourAgo);
            
            if (requests.length >= 10) {
                return false;
            }
            
            requests.push(now);
            localStorage.setItem(key, JSON.stringify(requests));
            return true;
        }

        // Track user behavior
        let userInteractions = 0;
        let formStartTime = Date.now();

        document.addEventListener('click', () => userInteractions++);
        document.addEventListener('keypress', () => userInteractions++);

        // ============================================
        // FORM GENERATION
        // ============================================

        document.getElementById('formTitle').textContent = FORM_CONFIG.title;
        document.getElementById('formDescription').textContent = FORM_CONFIG.description;

        function generateFormQuestions() {
            const container = document.getElementById('formQuestions');
            
            FORM_QUESTIONS.forEach(question => {
                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';
                
                const label = document.createElement('label');
                label.className = 'question-label';
                label.htmlFor = question.id;
                label.innerHTML = question.label + (question.required ? '<span class="required-mark">*</span>' : '');
                
                let input;
                
                if (question.type === 'textarea') {
                    input = document.createElement('textarea');
                    input.className = 'input-field';
                    input.id = question.id;
                    input.name = question.id;
                    input.placeholder = question.placeholder || '';
                    input.required = question.required;
                } else if (question.type === 'select') {
                    input = document.createElement('select');
                    input.className = 'input-field';
                    input.id = question.id;
                    input.name = question.id;
                    input.required = question.required;
                    
                    question.options.forEach(option => {
                        const optionElement = document.createElement('option');
                        optionElement.value = option.value;
                        optionElement.textContent = option.label;
                        input.appendChild(optionElement);
                    });
                } else {
                    input = document.createElement('input');
                    input.type = question.type;
                    input.className = 'input-field';
                    input.id = question.id;
                    input.name = question.id;
                    input.placeholder = question.placeholder || '';
                    input.required = question.required;
                }
                
                input.addEventListener('focus', () => {
                    questionCard.classList.add('focused');
                });
                
                input.addEventListener('blur', () => {
                    questionCard.classList.remove('focused');
                });
                
                questionCard.appendChild(label);
                questionCard.appendChild(input);
                container.appendChild(questionCard);
            });
        }

        generateFormQuestions();

        // ============================================
        // DATE VALIDATION
        // ============================================

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').min = today;
        document.getElementById('endDate').min = today;

        document.getElementById('startDate').addEventListener('change', validateDateRange);
        document.getElementById('endDate').addEventListener('change', validateDateRange);

        function validateDateRange() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const dateAlert = document.getElementById('dateAlert');
            const submitBtn = document.getElementById('submitBtn');

            if (!startDate || !endDate) {
                dateAlert.style.display = 'none';
                return;
            }

            const start = new Date(startDate);
            const end = new Date(endDate);
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

            if (end < start) {
                dateAlert.className = 'alert alert-error';
                dateAlert.textContent = 'Tanggal selesai tidak boleh lebih awal dari tanggal mulai!';
                dateAlert.style.display = 'block';
                submitBtn.disabled = true;
                return;
            }

            if (diffDays > FORM_CONFIG.maxDateRange) {
                dateAlert.className = 'alert alert-error';
                dateAlert.textContent = `Rentang tanggal maksimal ${FORM_CONFIG.maxDateRange} hari!`;
                dateAlert.style.display = 'block';
                submitBtn.disabled = true;
                return;
            }

            if (diffDays < FORM_CONFIG.minDateRange) {
                dateAlert.className = 'alert alert-error';
                dateAlert.textContent = `Rentang tanggal minimal ${FORM_CONFIG.minDateRange} hari!`;
                dateAlert.style.display = 'block';
                submitBtn.disabled = true;
                return;
            }

            dateAlert.style.display = 'none';
            checkAvailability(startDate, endDate);
        }

        // ============================================
        // AVAILABILITY CHECK
        // ============================================

        async function checkAvailability(startDate, endDate) {
            const availabilityAlert = document.getElementById('availabilityAlert');
            const submitBtn = document.getElementById('submitBtn');

            try {
                const securityData = generateSignature({ action: 'check', startDate, endDate });
                
                const url = `${elgoskrip}?action=checkAvailability&startDate=${startDate}&endDate=${endDate}&sig=${securityData.signature}&ts=${securityData.timestamp}&fp=${securityData.fingerprint}&token=${btoa(firetokek)}`;
                
                const response = await fetch(url);
                const data = await response.json();

                if (data.available) {
                    availabilityAlert.className = 'alert alert-success';
                    availabilityAlert.textContent = '✓ Tanggal tersedia!';
                    availabilityAlert.style.display = 'block';
                    submitBtn.disabled = false;
                } else {
                    availabilityAlert.className = 'alert alert-warning';
                    availabilityAlert.innerHTML = `<strong>Kegiatan pada rentang tanggal ini sudah penuh!</strong><br>Tolong hubungi Kepala Seksi jika ini kegiatan mendesak.`;
                    availabilityAlert.style.display = 'block';
                    submitBtn.disabled = true;
                }
            } catch (error) {
                console.error('Error checking availability:', error);
                availabilityAlert.className = 'alert alert-info';
                availabilityAlert.textContent = 'Sedang memeriksa ketersediaan...';
                availabilityAlert.style.display = 'block';
                submitBtn.disabled = false;
            }
        }

        // ============================================
        // FORM SUBMISSION
        // ============================================

        document.getElementById('activityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Check honeypot (bot trap)
            if (document.querySelector('[name="website"]').value !== '') {
                console.log('Bot detected');
                return;
            }
            
            // Check user interactions (bot detection)
            const timeSpent = (Date.now() - formStartTime) / 1000;
            if (timeSpent < 5 || userInteractions < 3) {
                alert('Mohon isi form dengan benar');
                return;
            }
            
            // Check client-side rate limit
            if (!checkClientRateLimit()) {
                alert('Terlalu banyak pengiriman. Silakan tunggu beberapa saat.');
                return;
            }
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Remove honeypot from data
            delete data.website;
            
            // Add date range
            data.startDate = document.getElementById('startDate').value;
            data.endDate = document.getElementById('endDate').value;
            data.timestamp = new Date().toISOString();
            
            // Add security data
            const securityData = generateSignature(data);
            data.signature = securityData.signature;
            data.requestTimestamp = securityData.timestamp;
            data.fingerprint = securityData.fingerprint;
            data.token = btoa(firetokek);
            data.interactions = userInteractions;
            data.timeSpent = Math.floor(timeSpent);

            // Show loading
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch(elgoskrip, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    const successMessage = document.getElementById('successMessage');
                    successMessage.textContent = '✓ Data berhasil dikirim! Terima kasih.';
                    successMessage.style.display = 'block';
                    
                    setTimeout(() => {
                        clearForm();
                        successMessage.style.display = 'none';
                    }, 3000);
                } else {
                    alert('Gagal mengirim data: ' + (result.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error submitting form:', error);
                alert('Terjadi kesalahan saat mengirim data. Silakan coba lagi.');
            } finally {
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            }
        });

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================

        function clearForm() {
            document.getElementById('activityForm').reset();
            document.getElementById('dateAlert').style.display = 'none';
            document.getElementById('availabilityAlert').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
            userInteractions = 0;
            formStartTime = Date.now();
        }
    </script>
</body>
</html>
